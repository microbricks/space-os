<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>SpaceOS Pro VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="script.js" defer></script>

  <style>
    * { box-sizing: border-box; }
    body { margin:0; overflow:hidden; font-family: system-ui, sans-serif; }

    #bgVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      display: none;
    }

    #dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 10;
    }

    .dock-btn {
      padding: 10px 18px;
      background: rgba(10,10,10,0.85);
      color: #fff;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    .window {
      position: fixed;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 55vw;
      max-width: 720px;
      height: 55vh;
      background: rgba(8,8,12,0.92);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9;
      backdrop-filter: blur(10px);
    }

    .window-header {
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
    }

    .window-title { opacity: 0.9; }

    .window-close {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: none;
      background: #ff5f57;
      cursor: pointer;
    }

    .window-body {
      padding: 8px;
      height: 100%;
      overflow: auto;
      font-size: 13px;
    }

    #notesArea {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px;
      border-radius: 8px;
      resize: none;
    }

    #browserFrame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
      background: #111;
    }

    #settingsBody label {
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<video id="bgVideo" autoplay playsinline></video>

<div id="dock">
  <button class="dock-btn" data-app="browser">Browser</button>
  <button class="dock-btn" data-app="notes">Notities</button>
  <button class="dock-btn" data-app="settings">Instellingen</button>
  <button class="dock-btn" id="cameraBgBtn">AR Background</button>
</div>

<div class="window" id="win-browser">
  <div class="window-header">
    <span class="window-title">VR Browser</span>
    <button class="window-close" data-close="browser"></button>
  </div>
  <div class="window-body">
    <iframe id="browserFrame" src="https://example.com"></iframe>
  </div>
</div>

<div class="window" id="win-notes">
  <div class="window-header">
    <span class="window-title">Notities</span>
    <button class="window-close" data-close="notes"></button>
  </div>
  <div class="window-body">
    <textarea id="notesArea" placeholder="Schrijf hier je VR-notities..."></textarea>
  </div>
</div>

<div class="window" id="win-settings">
  <div class="window-header">
    <span class="window-title">SpaceOS Instellingen</span>
    <button class="window-close" data-close="settings"></button>
  </div>
  <div class="window-body" id="settingsBody">
    <label>Joy-Con locomotion: <span id="joyconStatus">Niet gedetecteerd</span></label>
    <label>Keyboard locomotion: <span id="keyboardStatus">Actief (WASD)</span></label>
    <label>AR Background: <span id="arStatus">Uit</span></label>
  </div>
</div>

<a-scene>
  <a-entity id="cameraRig" position="0 1.6 0">
    <a-entity camera look-controls></a-entity>
  </a-entity>

  <!-- oude “ruimte” omgeving -->
  <a-sky id="sky" color="#000010"></a-sky>
  <a-entity geometry="primitive: sphere; radius: 40"
            material="color: #000020; shader: flat; opacity: 1"></a-entity>
  <a-entity geometry="primitive: sphere; radius: 60"
            material="color: #111133; shader: flat; opacity: 0.4"></a-entity>
  <a-plane color="#05070b" width="40" height="40" rotation="-90 0 0"></a-plane>
</a-scene>

</body>
</html>
