<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>SpaceOS Camera Background</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }

    #camVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      display: none;
    }

    #cameraBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px 14px;
      background: #00aaff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    /* SpaceOS melding */
    #melding {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 20;
      display: none;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <video id="camVideo" autoplay playsinline muted></video>

  <button id="cameraBtn">Camera achtergrond</button>

  <div id="melding"></div>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <a-scene id="scene" renderer="alpha: true; colorManagement: true">
    <a-entity id="rig" position="0 1.6 0">
      <a-entity camera look-controls></a-entity>
    </a-entity>

    <a-box position="0 1.5 -2" color="#4CC3D9"></a-box>
  </a-scene>

  <script src="script.js"></script>

</body>
</html>
