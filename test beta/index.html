<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>SpaceOS Camera Background</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }

    #camVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      display: none;
    }

    #cameraBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px 14px;
      background: #00aaff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Camera video -->
  <video id="camVideo" autoplay playsinline muted></video>

  <!-- UI knop -->
  <button id="cameraBtn">Camera achtergrond</button>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- VR Scene -->
  <a-scene id="scene" renderer="alpha: true; colorManagement: true">
    <a-entity id="rig" position="0 1.6 0">
      <a-entity camera look-controls></a-entity>
    </a-entity>

    <!-- Een simpel object zodat je ziet dat VR werkt -->
    <a-box position="0 1.5 -2" color="#4CC3D9"></a-box>
  </a-scene>

  <!-- Jouw JS bestand -->
  <script src="spaceos.js"></script>

</body>
</html>
