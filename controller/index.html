<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Gorilla Controller (iPad)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#111; color:#fff; font-family:system-ui; display:flex; flex-direction:column; height:100vh; }
    #top { padding:10px; background:#222; }
    #buttons { flex:1; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }
    .btn { background:#333; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .btn:active { background:#555; }
    #qrscan, #qrreturn { padding:10px; background:#000; }
    video { width:100%; border-radius:10px; margin-top:10px; }
    textarea { width:100%; height:80px; }
  </style>
</head>
<body>

<div id="top">
  <div><b>Gorilla Tag Controller (iPad)</b></div>
  <div id="status">Status: geen verbinding</div>
</div>

<div id="buttons">
  <div class="btn" data-action="forward">FORWARD</div>
  <div class="btn" data-action="jump">JUMP</div>
  <div class="btn" data-action="climb">CLIMB</div>
  <div class="btn" data-action="tag">TAG</div>
</div>

<div id="qrscan">
  <b>Scan VR QR‑code</b><br>
  <button id="startScanBtn">Start QR‑scan</button>
  <video id="video" autoplay></video>
</div>

<div id="qrreturn">
  <b>QR‑code terug naar VR</b><br>
  <canvas id="qrCanvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
<script src="controller.js"></script>
</body>
</html>
