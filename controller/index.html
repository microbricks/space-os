<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Gorilla Controller (iPad)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #top {
      padding: 10px;
      background: #222;
    }
    #status {
      font-size: 14px;
    }
    #buttons {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }
    .btn {
      background: #333;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      user-select: none;
      touch-action: manipulation;
    }
    .btn:active {
      background: #555;
    }
    #tm-area {
      padding: 10px;
      background: #000;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="top">
  <div>Gorilla Tag Controller (iPad)</div>
  <div id="status">Status: niet verbonden</div>
</div>

<div id="buttons">
  <div class="btn" data-action="jump">JUMP</div>
  <div class="btn" data-action="forward">FORWARD</div>
  <div class="btn" data-action="climb">CLIMB</div>
  <div class="btn" data-action="tag">TAG</div>
</div>

<div id="tm-area">
  <div><b>Teachable Machine</b></div>
  <div>Model URL: <span id="modelUrlLabel">nog niet geladen</span></div>
  <button id="loadModelBtn">Laad TM model</button>
  <div id="tmStatus">TM: niet actief</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="controller.js"></script>
</body>
</html>
